<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intel-Nexus | Global Logistics Command</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@300;400;700;900&display=swap');
        :root { --bg: #020617; --card: #0F172A; --accent: #3B82F6; }
        body { background: var(--bg); font-family: 'Inter', sans-serif; color: #F8FAFC; overflow: hidden; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .status-pill { font-family: 'JetBrains Mono', monospace; font-size: 10px; padding: 2px 8px; border-radius: 4px; }
        .tab-active { border-bottom: 3px solid var(--accent); color: var(--accent); }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen">

    <aside class="w-20 hover:w-64 bg-slate-950 border-r border-slate-800 transition-all duration-300 flex flex-col items-center py-8 z-50 group">
        <div class="text-blue-500 mb-12"><i class="fas fa-microchip text-3xl"></i></div>
        <nav class="flex-1 space-y-10">
            <button onclick="showTab('recon')" class="flex items-center space-x-4 text-slate-400 hover:text-white transition w-full px-6">
                <i class="fas fa-sync-alt text-xl"></i><span class="hidden group-hover:block font-bold uppercase text-xs tracking-widest">Reconciliation</span>
            </button>
            <button onclick="showTab('inventory')" class="flex items-center space-x-4 text-slate-400 hover:text-white transition w-full px-6">
                <i class="fas fa-boxes-stacked text-xl"></i><span class="hidden group-hover:block font-bold uppercase text-xs tracking-widest">Inventory SOH</span>
            </button>
            <button onclick="showTab('central')" class="flex items-center space-x-4 text-slate-400 hover:text-white transition w-full px-6">
                <i class="fas fa-truck-fast text-xl"></i><span class="hidden group-hover:block font-bold uppercase text-xs tracking-widest">Central Flow</span>
            </button>
        </nav>
        <button onclick="toggleSettings()" class="text-slate-600 hover:text-white"><i class="fas fa-gears text-xl"></i></button>
    </aside>

    <main class="flex-1 flex flex-col relative overflow-hidden">
        
        <header class="h-20 border-b border-slate-800 flex items-center justify-between px-10 glass">
            <div class="flex items-center space-x-4">
                <h1 class="text-xl font-black tracking-tighter uppercase italic">Intel<span class="text-blue-500">Nexus</span></h1>
                <div class="h-4 w-[1px] bg-slate-700"></div>
                <input type="text" id="hubSearch" onkeyup="filterHub()" placeholder="SEARCH HUB (e.g. DHAKA SOUTH)..." class="bg-transparent border-none outline-none text-xs font-bold tracking-widest text-blue-400 w-64 uppercase">
            </div>
            <div id="liveTime" class="text-[10px] font-mono text-slate-500">SYSTEM: ACTIVE</div>
        </header>

        <div class="flex-1 overflow-y-auto p-8">
            
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                <div class="glass p-6 rounded-xl">
                    <p class="text-[10px] font-bold text-slate-500 uppercase">National Efficiency</p>
                    <h2 id="stat-eff" class="text-3xl font-black text-emerald-500 font-mono">0%</h2>
                </div>
                <div class="glass p-6 rounded-xl border-l-4 border-red-500">
                    <p class="text-[10px] font-bold text-red-500 uppercase">Total Mismatch</p>
                    <h2 id="stat-miss" class="text-3xl font-black font-mono">0</h2>
                </div>
                <div class="glass p-6 rounded-xl border-l-4 border-blue-500">
                    <p class="text-[10px] font-bold text-blue-500 uppercase">Processed Today</p>
                    <h2 id="stat-proc" class="text-3xl font-black font-mono">0</h2>
                </div>
                <div class="glass p-6 rounded-xl">
                    <p class="text-[10px] font-bold text-slate-500 uppercase">Central ISD/OSD</p>
                    <h2 id="stat-isd" class="text-3xl font-black font-mono">0</h2>
                </div>
            </div>

            <div class="glass rounded-2xl overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-slate-900/50 border-b border-slate-800">
                        <tr class="text-[10px] text-slate-400 uppercase font-black tracking-widest">
                            <th class="p-5">Entity / Identification</th>
                            <th class="p-5 text-center">Expected</th>
                            <th class="p-5 text-center text-blue-400">Processed</th>
                            <th class="p-5 text-center text-red-400">Pending</th>
                            <th class="p-5 text-right">Operational Status</th>
                        </tr>
                    </thead>
                    <tbody id="masterBody" class="divide-y divide-slate-800/50 text-sm font-medium">
                        <tr><td colspan="5" class="p-20 text-center text-slate-600 italic">Connecting to National Command Bridge...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div id="settingsBox" class="hidden absolute inset-0 bg-slate-950/90 z-[100] flex items-center justify-center p-4">
            <div class="bg-slate-900 border border-blue-500/30 p-10 rounded-3xl max-w-lg w-full shadow-2xl">
                <h3 class="text-2xl font-black mb-2 italic">BRIDGE CONFIG</h3>
                <p class="text-xs text-slate-500 mb-6 uppercase tracking-widest">Secure Apps Script Web App Connection</p>
                <input type="text" id="apiInput" placeholder="PASTE WEB APP URL..." class="w-full p-4 bg-slate-950 border border-slate-800 rounded-xl mb-6 text-sm font-mono text-blue-400">
                <button onclick="saveAPI()" class="w-full bg-blue-600 py-4 rounded-xl font-black uppercase tracking-widest hover:bg-blue-700 transition">Establish Connection</button>
                <button onclick="toggleSettings()" class="w-full mt-4 text-slate-500 text-xs font-bold uppercase">Cancel</button>
            </div>
        </div>
    </main>

    <script>
        let fullData = [];
        let currentTab = 'recon';

        window.onload = () => {
            const savedLink = localStorage.getItem('nexus_pro_api');
            if(savedLink) { fetchData(); } else { toggleSettings(); }
            setInterval(() => { document.getElementById('liveTime').innerText = "LIVE: " + new Date().toLocaleTimeString(); }, 1000);
        };

        function showTab(tab) {
            currentTab = tab;
            renderData(fullData);
        }

        function toggleSettings() { document.getElementById('settingsBox').classList.toggle('hidden'); }

        function saveAPI() {
            const link = document.getElementById('apiInput').value;
            localStorage.setItem('nexus_pro_api', link);
            toggleSettings();
            fetchData();
        }

        async function fetchData() {
            const url = localStorage.getItem('nexus_pro_api');
            if(!url) return;
            try {
                const res = await fetch(url);
                fullData = await res.json();
                renderData(fullData);
            } catch (e) { console.error("Bridge Connection Failed"); }
        }

        function filterHub() {
            const query = document.getElementById('hubSearch').value.toUpperCase();
            const filtered = fullData.filter(item => 
                item.hub.toUpperCase().includes(query) || item.merchantName.toUpperCase().includes(query)
            );
            renderData(filtered);
        }

        function renderData(data) {
            const tbody = document.getElementById('masterBody');
            tbody.innerHTML = '';
            let tExp = 0, tProc = 0, tPend = 0;

            data.forEach(item => {
                tExp += item.expected;
                tProc += item.processed;
                tPend += item.remaining;

                const isError = item.remaining > 0;
                const rowStyle = isError ? 'bg-red-500/5' : 'hover:bg-slate-800/30';
                
                tbody.innerHTML += `
                    <tr class="${rowStyle} transition-all">
                        <td class="p-5">
                            <div class="font-black text-slate-200 tracking-tight">${item.merchantName}</div>
                            <div class="text-[10px] text-slate-500 font-bold">${item.hub}</div>
                        </td>
                        <td class="p-5 text-center font-mono text-slate-500">${item.expected}</td>
                        <td class="p-5 text-center font-mono font-bold text-blue-400">${item.processed}</td>
                        <td class="p-5 text-center font-mono font-bold ${isError ? 'text-red-500' : 'text-slate-700'}">${item.remaining}</td>
                        <td class="p-5 text-right">
                            <span class="status-pill ${isError ? 'bg-red-500/10 text-red-500' : 'bg-emerald-500/10 text-emerald-500'}">
                                ${isError ? 'ANOMALY DETECTED' : 'SYNCHRONIZED'}
                            </span>
                        </td>
                    </tr>`;
            });

            document.getElementById('stat-eff').innerText = tExp > 0 ? ((tProc/tExp)*100).toFixed(1) + '%' : '0%';
            document.getElementById('stat-miss').innerText = tPend;
            document.getElementById('stat-proc').innerText = tProc;
            document.getElementById('stat-isd').innerText = data.length; // Placeholder for logic
        }
    </script>
</body>
</html>
